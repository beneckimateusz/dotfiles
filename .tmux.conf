# base: https://docs.j7k6.org/my-minimal-tmux-setup/

# general settings
unbind C-b
set -g prefix C-s
set -g aggressive-resize on
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g bell-action none
setw -g xterm-keys on
set -g renumber-windows on
set -g display-panes-time 2000
set -g history-limit 65536
setw -g monitor-activity on

# style
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",screen-256color:RGB"
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 80
set -g status-style "bg=#282c34,fg=#abb2bf"
set -g status-left "#[fg=#282c34,bg=#61afef,bold] #S #[default]"
set -g status-right "#[fg=#e06c75]#{?client_prefix,PREFIX ,}#[fg=#abb2bf]%a %Y-%m-%d #[fg=#56b6c2]%H:%M "
set -g window-status-format "#[fg=#5c6370] #I:#W "
set -g window-status-current-format "#[fg=#282c34,bg=#98c379,bold] #I:#W #[default]"
set -g window-status-activity-style "fg=#e5c07b,bold"
set -g window-status-bell-style "fg=#e06c75,bold"
set -g pane-border-style "fg=#3e4451"
set -g pane-active-border-style "fg=#61afef"
set -g message-style "bg=#282c34,fg=#61afef,bold"
set -g mode-style "bg=#e5c07b,fg=#282c34,bold"

# vim-like behavior
setw -g mode-keys vi

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# vim-like copy & paste
bind p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -sel c'
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# key bindings
bind \" split-window -h -c "#{pane_current_path}"
bind % split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf
bind t select-layout tiled

# plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
