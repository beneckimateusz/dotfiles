# base: https://docs.j7k6.org/my-minimal-tmux-setup/

# general settings
unbind C-b
set -g prefix C-s
set -g aggressive-resize on
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g bell-action none
setw -g xterm-keys on
set -g renumber-windows on
set -g display-panes-time 2000
set -g history-limit 65536
setw -g monitor-activity on

# style
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",screen-256color:RGB"

# vim-like behavior
setw -g mode-keys vi

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# vim-like copy & paste
bind p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -sel c'
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# key bindings
bind \" split-window -h -c "#{pane_current_path}"
bind % split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf
bind t select-layout tiled

# plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'

set -g status-left ""
set -g status-right '#[fg=#{@thm_crust},bg=#{@thm_teal}] session: #S '
set -g status-right-length 100

set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g automatic-rename-format "#{?pane_in_mode,[tmux],#{?pane_dead,[dead],#{b:pane_current_path} | #{pane_current_command}}}"
